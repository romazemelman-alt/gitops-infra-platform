apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-node-app
  namespace: k8s-node-app
spec:
  interval: 5m
  releaseName: k8s-node-app-stage
  targetNamespace: k8s-node-app
  chart:
    spec:
      chart: ./charts/k8s-node-app
      sourceRef:
        kind: GitRepository
        name: node-app-source
        namespace: flux-system
  values:
    replicaCount: 2
    image:
      tag: "rc-latest"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi