apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-node-app-dev
  namespace: k8s-node-app
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/k8s-node-app
      sourceRef:
        kind: GitRepository
        name: node-app-source
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      repository: "YOUR_ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/k8s-node-app"
      tag: "dev-v1.0"